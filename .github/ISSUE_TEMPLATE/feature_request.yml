name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion. Please describe the feature and the problem it solves.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What limitation are you hitting?
      placeholder: "I'm trying to ... but currently the engine ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered and why they fall short.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the engine does this relate to?
      options:
        - MCP tools (create_prompt_basis, explore_space, extend_schema)
        - Pipeline stages
        - Graph / Construct data
        - Mathematical computations
        - Caching
        - Developer experience / packaging
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, examples, or screenshots.
